<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relieving Letters | KrishiHR</title>
  <link rel="icon" type="image/x-icon" href="Logo_kcms.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .rl-container { max-width:1100px; margin:0 auto; padding:24px 16px; }
    .rl-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    .rl-header h2 { font-size:20px; font-weight:700; color:#1B5E20; margin:0; }
    .rl-stats { display:flex; gap:12px; flex-wrap:wrap; }
    .rl-stat { background:#f0fdf4; border:1px solid #c8e6c9; border-radius:8px; padding:10px 18px; text-align:center; }
    .rl-stat .num { font-size:20px; font-weight:700; color:#1B5E20; }
    .rl-stat .lbl { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:.5px; }
    .rl-toolbar { display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
    .rl-toolbar input { padding:8px 14px; border:1px solid #ccc; border-radius:6px; font-size:13px; min-width:220px; }
    .btn-bulk { background:#E65100; color:#fff; border:none; border-radius:6px; padding:8px 20px; font-size:13px; font-weight:600; cursor:pointer; }
    .btn-bulk:disabled { opacity:.5; cursor:not-allowed; }
    .rl-table { width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .rl-table th { background:#1B5E20; color:#fff; padding:10px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.5px; text-align:left; }
    .rl-table td { padding:10px 12px; font-size:13px; border-bottom:1px solid #eee; vertical-align:middle; }
    .rl-table tr:hover td { background:#f0fdf4; }
    .rl-table .chk { width:18px; height:18px; cursor:pointer; }
    .badge { display:inline-block; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; }
    .badge-sent { background:#c8e6c9; color:#1B5E20; }
    .badge-pending { background:#fff3e0; color:#E65100; }
    .badge-no-email { background:#ffcdd2; color:#b71c1c; }
    .btn-send { background:#1B5E20; color:#fff; border:none; border-radius:5px; padding:6px 14px; font-size:12px; font-weight:600; cursor:pointer; }
    .btn-send:disabled { opacity:.5; cursor:not-allowed; }
    .btn-send:hover:not(:disabled) { background:#2E7D32; }
    .empty-state { text-align:center; padding:60px 20px; color:#888; }
    .empty-state h3 { font-size:18px; margin-bottom:8px; }
    @media (max-width:768px) {
      .rl-table { font-size:12px; }
      .rl-table th, .rl-table td { padding:8px 6px; }
    }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark" id="sidebar-logo-mark">
      <svg class="logo-mark-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div>
      <div class="logo-text-wrap"><div class="logo-text">Krishi<span>HR</span></div></div>
    </div>
  </div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div id="sidebar-user"></div>
    <button class="logout-btn" onclick="Auth.logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="topbar-title">Relieving Letters</div>
    </div>
    <div class="topbar-right">
      <button id="notif-bell-btn" class="topbar-icon-btn notif-btn" title="Notifications">🔔<span id="notif-badge"></span></button>
      <a class="topbar-icon-btn" href="dashboard.html" title="Dashboard">🏠</a>
    </div>
  </div>

  <div class="rl-container">
    <div class="rl-header">
      <h2>📄 Relieving Letters</h2>
      <div class="rl-stats">
        <div class="rl-stat"><div class="num" id="stat-total">0</div><div class="lbl">Total Separated</div></div>
        <div class="rl-stat"><div class="num" id="stat-sent">0</div><div class="lbl">Letters Sent</div></div>
        <div class="rl-stat"><div class="num" id="stat-pending">0</div><div class="lbl">Pending</div></div>
      </div>
    </div>

    <div class="rl-toolbar">
      <input type="text" id="search-input" placeholder="Search name, code, email…" oninput="renderTable()">
      <button class="btn-bulk" id="btn-bulk-send" disabled onclick="bulkSend()">📤 Send Selected (<span id="selected-count">0</span>)</button>
    </div>

    <div id="table-wrap">
      <div class="empty-state"><h3>Loading…</h3></div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
Auth.guard();
buildSidebar('relieving-letter.html');

let employees = [];

async function loadData() {
  const data = await api('GET', '/relieving-letters/eligible');
  if (!data || !data.success) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty-state"><h3>Failed to load</h3><p>' + (data?.message || 'Server error') + '</p></div>';
    return;
  }
  employees = data.data || [];
  updateStats();
  renderTable();
}

function updateStats() {
  const total = employees.length;
  const sent = employees.filter(e => e.relieving_letter_sent_at).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-sent').textContent = sent;
  document.getElementById('stat-pending').textContent = total - sent;
}

function renderTable() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const filtered = employees.filter(e => {
    const name = ((e.first_name || '') + ' ' + (e.last_name || '')).toLowerCase();
    const code = (e.employee_code || '').toLowerCase();
    const email = (e.alternate_email || '').toLowerCase();
    return !q || name.includes(q) || code.includes(q) || email.includes(q);
  });

  if (!filtered.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty-state"><h3>No separated employees found</h3><p>Employees who are terminated, resigned, or separated will appear here.</p></div>';
    return;
  }

  let html = `<table class="rl-table">
    <thead><tr>
      <th><input type="checkbox" class="chk" id="select-all" onchange="toggleAll(this)"></th>
      <th>Employee</th>
      <th>Designation</th>
      <th>Joining Date</th>
      <th>Relieving Date</th>
      <th>Personal Email</th>
      <th>Status</th>
      <th>Action</th>
    </tr></thead><tbody>`;

  for (const e of filtered) {
    const name = ((e.first_name || '') + ' ' + (e.last_name || '')).trim();
    const personalEmail = e.alternate_email || '';
    const hasEmail = personalEmail && personalEmail.includes('@') && !personalEmail.toLowerCase().includes('@krishicare.in');
    const isSent = !!e.relieving_letter_sent_at;
    const joinDate = e.joining_date ? new Date(e.joining_date).toLocaleDateString('en-IN') : '—';
    const relDate = (e.separation_date || e.last_working_date) ? new Date(e.separation_date || e.last_working_date).toLocaleDateString('en-IN') : '—';
    const sepType = e.separation_type || e.sep_type || '';

    let badge = '';
    if (isSent) badge = '<span class="badge badge-sent">✓ Sent</span>';
    else if (!hasEmail) badge = '<span class="badge badge-no-email">No Email</span>';
    else badge = '<span class="badge badge-pending">Pending</span>';

    html += `<tr>
      <td><input type="checkbox" class="chk row-chk" data-id="${e.id}" ${!hasEmail ? 'disabled' : ''} onchange="updateSelected()"></td>
      <td><strong>${name}</strong><br><span style="color:#888;font-size:11px;">${e.employee_code || ''}</span></td>
      <td>${e.designation_title || '—'}<br><span style="color:#888;font-size:11px;">${e.department_name || ''}</span></td>
      <td>${joinDate}</td>
      <td>${relDate}${sepType ? '<br><span style="color:#888;font-size:11px;">'+sepType+'</span>' : ''}</td>
      <td style="font-size:12px;">${personalEmail || '<em style="color:#c62828;">Not set</em>'}</td>
      <td>${badge}</td>
      <td><button class="btn-send" ${!hasEmail ? 'disabled title="Set personal email first"' : ''} onclick="sendOne(${e.id}, this)">📤 Send</button></td>
    </tr>`;
  }

  html += '</tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
  updateSelected();
}

function toggleAll(el) {
  document.querySelectorAll('.row-chk:not(:disabled)').forEach(c => c.checked = el.checked);
  updateSelected();
}

function updateSelected() {
  const checked = document.querySelectorAll('.row-chk:checked');
  document.getElementById('selected-count').textContent = checked.length;
  document.getElementById('btn-bulk-send').disabled = checked.length === 0;
}

async function sendOne(empId, btn) {
  btn.disabled = true;
  btn.textContent = '⏳…';
  try {
    const data = await api('POST', `/relieving-letters/send/${empId}`);
    if (data?.success) {
      toast(data.message, 'success');
      loadData();
    } else {
      toast(data?.message || 'Failed', 'error');
      btn.disabled = false;
      btn.textContent = '📤 Send';
    }
  } catch (err) {
    toast('Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = '📤 Send';
  }
}

async function bulkSend() {
  const ids = Array.from(document.querySelectorAll('.row-chk:checked')).map(c => parseInt(c.dataset.id));
  if (!ids.length) return;
  if (!confirm(`Send relieving letters to ${ids.length} employee(s)?`)) return;

  const btn = document.getElementById('btn-bulk-send');
  btn.disabled = true;
  btn.innerHTML = '⏳ Processing…';

  try {
    const token = Auth.getToken();
    const resp = await fetch(API_BASE + '/relieving-letters/bulk-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ employee_ids: ids })
    });
    const data = await resp.json();

    if (data?.success) {
      let msg = `Sent: ${data.sent}, Failed: ${data.failed}`;
      if (data.failed > 0) {
        const failedList = data.results.filter(r => r.status === 'failed').map(r => `${r.name}: ${r.reason}`).join('\n');
        msg += '\n\nFailed:\n' + failedList;
      }
      toast(`Bulk send complete — ${data.sent} sent, ${data.failed} failed`, data.failed ? 'error' : 'success');
      if (data.failed > 0) alert(msg);
      loadData();
    } else {
      toast(data?.message || 'Failed', 'error');
    }
  } catch (err) {
    toast('Error: ' + err.message, 'error');
  }

  btn.disabled = false;
  btn.innerHTML = '📤 Send Selected (<span id="selected-count">0</span>)';
  updateSelected();
}

loadData();
</script>
</body>
</html>
