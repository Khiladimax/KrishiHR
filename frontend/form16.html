<style>
/* ── Screen: A4 paper simulation ── */
#form16-area {
  background: #e8ede8;
  padding: 28px 0;
  min-height: 100vh;
}
.f16-page {
  width: 794px;            /* A4 at 96dpi */
  min-height: 1123px;
  background: #fff;
  margin: 0 auto 28px auto;
  box-shadow: 0 4px 32px rgba(0,0,0,0.18);
  border-radius: 4px;
  overflow: hidden;
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px;
  color: #1a1a1a;
  padding: 28px 32px 36px;
  box-sizing: border-box;
}

/* ── Print: real A4 ── */
@media print {
  /* Hide EVERYTHING except the form content */
  body > *                          { display: none !important; }
  #form16-print-wrap                { display: block !important; }
  @page { size: A4 portrait; margin: 10mm 10mm; }
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  .page-break { page-break-before: always; }
  .no-break   { page-break-inside: avoid; }
  tr          { page-break-inside: avoid; }
  .f16-page {
    width: 100% !important;
    min-height: unset !important;
    margin: 0 !important;
    padding: 14px 16px !important;
    box-shadow: none !important;
    border-radius: 0 !important;
  }
}

/* Print wrapper — hidden on screen, shown on print */
#form16-print-wrap {
  display: none;
}

/* ── Form 16 component styles ── */
.f16-section-hdr {
  background: #e8f5e9; color: #1B5E20; font-weight: 700;
  font-size: 11.5px; padding: 7px 14px;
  border-top: 1.5px solid #c8e6c9; border-bottom: 1px solid #c8e6c9;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.f16-row {
  display: flex; justify-content: space-between;
  padding: 6px 14px; border-bottom: 1px solid #f0f8f0; font-size: 12.5px;
}
.f16-row:last-child { border-bottom: none; }
.f16-lbl { color: #666; }
.f16-val { font-weight: 600; color: #1a1a1a; }
.f16-total {
  display: flex; justify-content: space-between;
  padding: 8px 14px; background: #e8f5e9;
  font-weight: 700; font-size: 13px; color: #1B5E20;
}
.f16-sub-hdr {
  background: #f9fbe7; color: #555; font-size: 11px; font-weight: 600;
  padding: 5px 14px; border-bottom: 1px solid #e8f5e9;
  border-top: 1px solid #e8f5e9;
}
.f16-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
.f16-table th {
  background: #f1f8e9; color: #2E7D32; font-weight: 700;
  padding: 7px 10px; text-align: left; border: 1px solid #c8e6c9;
}
.f16-table td { padding: 6px 10px; border: 1px solid #e8f5e9; }
.f16-table tr:nth-child(even) td { background: #f9fbe7; }
.badge-fy {
  display: inline-block; background: rgba(255,255,255,0.15);
  color: #fff; padding: 3px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  border: 1.5px solid rgba(255,255,255,0.4);
}
.q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 14px; }
.q-box {
  background: #f9fbe7; border: 1px solid #c8e6c9;
  border-radius: 6px; padding: 10px 14px;
}
.q-title { font-size: 12px; font-weight: 700; color: #2E7D32; margin-bottom: 6px; }
.q-row { display: flex; justify-content: space-between; font-size: 11.5px; color: #555; padding: 2px 0; }
.q-row span:last-child { font-weight: 600; color: #1a1a1a; }

<script>
Auth.guard();
loadNotifBadge();
buildSidebar('form16.html');
  loadNotifBadge();

const f16User = Auth.getUser();
const isHR = ['super_admin','admin','hr','accounts'].includes(f16User?.role);

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init() {
  // Show employee selector for HR/Admin
  if (isHR) {
    document.getElementById('emp-selector-wrap').style.display = '';
    const empRes = await api('GET', '/employees?active=true&limit=500');
    if (empRes?.success) {
      const sel = document.getElementById('f16-emp');
      // Add self first
      const me = document.createElement('option');
      me.value = f16User?.id;
      me.textContent = `${f16User?.first_name || 'Me'} ${f16User?.last_name || ''} (${f16User?.employee_code || 'Self'})`.trim();
      sel.appendChild(me);
      (empRes.data || []).filter(e => e.id !== f16User?.id).forEach(e => {
        const o = document.createElement('option');
        o.value = e.id;
        o.textContent = `${e.first_name} ${e.last_name} (${e.employee_code})`;
        sel.appendChild(o);
      });
      sel.value = f16User?.id; // ensure self is selected by default
      // When employee changes, reload FY list
      sel.addEventListener('change', loadFYList);
    }
  }
  await loadFYList();
})();

async function loadFYList() {
  const empId = isHR ? document.getElementById('f16-emp').value : '';
  const url   = empId ? `/payroll/form16/years?employee_id=${empId}` : '/payroll/form16/years';
  const res   = await api('GET', url);
  const sel   = document.getElementById('f16-fy');
  sel.innerHTML = '<option value="">-- Select FY --</option>';
  if (res?.success && res.data?.length) {
    res.data.forEach(fy => {
      const o = document.createElement('option');
      o.value = fy;
      o.textContent = `FY ${fy} (AY ${getAY(fy)})`;
      sel.appendChild(o);
    });
    sel.value = res.data[0]; // default to latest
  } else {
    sel.innerHTML = '<option value="">No payroll data found</option>';
  }
}

function getAY(fy) {
  const [start] = fy.split('-');
  const endFull = parseInt(start) + 1;
  return `${endFull}-${String(endFull + 1).slice(2)}`;
}

async function loadForm16() {
  const fy    = document.getElementById('f16-fy').value;
  const empId = isHR ? document.getElementById('f16-emp').value : '';
  const area  = document.getElementById('form16-area');

  if (!fy) { toast('Please select a Financial Year', 'error'); return; }

  area.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280">Loading Form 16…</div>';

  let url = `/payroll/form16?fy=${fy}`;
  if (empId) url += `&employee_id=${empId}`;

  const res = await api('GET', url);
  if (!res?.success) {
    area.innerHTML = `<div style="text-align:center;padding:40px;color:#ef4444">${res?.message || 'Failed to load Form 16'}</div>`;
    return;
  }

  document.getElementById('print-btn').style.display = '';
  renderForm16(res.data);
}

function f16fmt(n) {
  return '₹' + Number(n || 0).toLocaleString('en-IN');
}


function printForm16() {
  const inner = document.getElementById('form16-area-inner');
  if (!inner) { alert('Please load Form 16 first'); return; }
  // Copy form content into the print wrapper, print, then restore
  const wrap = document.getElementById('form16-print-wrap');
  wrap.innerHTML = inner.outerHTML;
  window.print();
  wrap.innerHTML = '';
}

          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0">Employee Code</td><td style="font-weight:600;padding:5px 0">${emp.code}</td></tr>
          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0">PAN</td><td style="font-weight:700;padding:5px 0;color:${emp.pan==='NOT PROVIDED'?'#ef4444':'#1a1a1a'}">${emp.pan}</td></tr>
          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0">UAN</td><td style="padding:5px 0">${emp.uan||'—'}</td></tr>
          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0">PF Number</td><td style="padding:5px 0">${emp.pf_number||'—'}</td></tr>
          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0">Department</td><td style="padding:5px 0">${emp.department}</td></tr>
          <tr><td style="color:#888;padding:5px 0">Designation</td><td style="padding:5px 0">${emp.designation}</td></tr>
        </table>
      </div>
      <div style="padding:14px 16px">
        <div style="font-size:10.5px;font-weight:700;color:#2E7D32;margin-bottom:10px;text-transform:uppercase;letter-spacing:.6px">Employer Details</div>
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0;width:110px">Name</td><td style="font-weight:600;padding:5px 0">${A.employer_name}</td></tr>
          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0">TAN</td><td style="font-weight:600;padding:5px 0">${A.employer_tan}</td></tr>
          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0">Address</td><td style="padding:5px 0;font-size:10.5px">Office No. 617, 6th Floor, Hubtown Viva, Western Express Highway, Shankarwadi, Jogeshwari (East), Mumbai – 400060</td></tr>
          <tr style="border-bottom:1px solid #f0f8f0"><td style="color:#888;padding:5px 0">Financial Year</td><td style="font-weight:600;padding:5px 0">FY ${fy}</td></tr>
          <tr><td style="color:#888;padding:5px 0">Assessment Year</td><td style="font-weight:600;padding:5px 0">${ay}</td></tr>
        </table>
      </div>
    </div>

    <!-- ══════════ PART A ══════════ -->
    <div style="border:1.5px solid #c8e6c9;border-radius:8px;overflow:hidden;margin-bottom:14px">
      <div class="f16-section-hdr">📋 Part A — Details of Tax Deducted and Deposited in Central Government Account</div>
      <div class="q-grid">
        ${A.quarter_summary.map(q=>`
          <div class="q-box">
            <div class="q-title">${q.quarter}</div>
            <div class="q-row"><span>TDS Deducted</span><span>${fmt(q.tds_deducted)}</span></div>
            <div class="q-row"><span>TDS Deposited</span><span>${fmt(q.tds_deposited)}</span></div>
          </div>`).join('')}
      </div>
      <div class="f16-total"><span>Total TDS Deducted &amp; Deposited</span><span>${fmt(A.total_tds_deducted)}</span></div>
    </div>

    <!-- ══════════ PART B ══════════ -->
    <div style="border:1.5px solid #c8e6c9;border-radius:8px;overflow:hidden;margin-bottom:14px">
      <div class="f16-section-hdr">📑 Part B — Details of Salary Paid and Tax Deducted</div>

      <div class="f16-sub-hdr">1. Gross Salary</div>
      <div class="f16-row"><span class="f16-lbl">(a) Basic Salary</span><span class="f16-val">${fmt(B.basic)}</span></div>
      <div class="f16-row"><span class="f16-lbl">(b) House Rent Allowance (HRA)</span><span class="f16-val">${fmt(B.hra)}</span></div>
      <div class="f16-row"><span class="f16-lbl">(c) Conveyance Allowance</span><span class="f16-val">${fmt(B.conveyance)}</span></div>
      <div class="f16-row"><span class="f16-lbl">(d) Special Allowance</span><span class="f16-val">${fmt(B.special_allowance)}</span></div>
      <div class="f16-total"><span>Total Gross Salary</span><span>${fmt(B.gross_salary)}</span></div>

      <div class="f16-sub-hdr">2. Less: Deduction u/s 16</div>
      <div class="f16-row"><span class="f16-lbl">Standard Deduction u/s 16(ia)</span><span class="f16-val">- ${fmt(B.standard_deduction)}</span></div>
      <div class="f16-total"><span>Income Chargeable under Head "Salaries"</span><span>${fmt(B.income_chargeable)}</span></div>

      <div class="f16-sub-hdr">3. Deductions under Chapter VI-A</div>
      <div class="f16-row"><span class="f16-lbl">Section 80C — PF Employee Contribution</span><span class="f16-val">- ${fmt(B.sec_80c_pf)}</span></div>
      <div class="f16-total"><span>Total Deductions (Chapter VI-A)</span><span>- ${fmt(B.total_deductions_vi_a)}</span></div>

      <div class="f16-row" style="background:#fff8e1;border-top:2px solid #ffd54f">
        <span style="font-weight:700;color:#e65100;font-size:13px">Net Taxable Income</span>
        <span style="font-weight:800;color:#e65100;font-size:14px">${fmt(B.net_taxable_income)}</span>
      </div>

      <div class="f16-sub-hdr">4. Tax Deducted at Source (TDS)</div>
      <div class="f16-total"><span>Total TDS Deducted on Salary</span><span>${fmt(B.total_tds)}</span></div>

      <div class="f16-sub-hdr">5. Statutory Deductions (For Reference)</div>
      <div class="f16-row"><span class="f16-lbl">PF Employee Contribution</span><span class="f16-val">${fmt(B.pf_employee_total)}</span></div>
      <div class="f16-row"><span class="f16-lbl">PF Employer Contribution</span><span class="f16-val">${fmt(B.pf_employer_total)}</span></div>
      <div class="f16-row"><span class="f16-lbl">ESI Employee Contribution</span><span class="f16-val">${fmt(B.esi_employee_total)}</span></div>
      <div class="f16-row"><span class="f16-lbl">Professional Tax</span><span class="f16-val">${fmt(B.professional_tax_total)}</span></div>
      <div class="f16-row"><span class="f16-lbl">Labour Welfare Fund (LWF)</span><span class="f16-val">${fmt(B.lwf_total)}</span></div>
      <div class="f16-total"><span>Net Salary Paid (Annual)</span><span>${fmt(B.net_salary_total)}</span></div>
    </div>

    <!-- ══════════ MONTHLY BREAKDOWN ══════════ -->
    <div class="page-break" style="border:1.5px solid #c8e6c9;border-radius:8px;overflow:hidden;margin-bottom:14px">
      <div class="f16-section-hdr">📅 Monthly Salary Breakdown — FY ${fy}</div>
      <div style="overflow-x:auto;padding:10px 14px">
        <table class="f16-table">
          <thead>
            <tr>
              <th>Month</th>
              <th style="text-align:right">Basic</th>
              <th style="text-align:right">HRA</th>
              <th style="text-align:right">Gross</th>
              <th style="text-align:right">PF(Emp)</th>
              <th style="text-align:right">ESI</th>
              <th style="text-align:right">PT</th>
              <th style="text-align:right">TDS</th>
              <th style="text-align:right">Net Salary</th>
            </tr>
          </thead>
          <tbody>
            ${months.map(m=>`
              <tr>
                <td>${m.month} ${m.year}</td>
                <td style="text-align:right">${fmt(m.basic)}</td>
                <td style="text-align:right">${fmt(m.hra)}</td>
                <td style="text-align:right;font-weight:600">${fmt(m.gross)}</td>
                <td style="text-align:right">${fmt(m.pf_employee)}</td>
                <td style="text-align:right">${fmt(m.esi_employee)}</td>
                <td style="text-align:right">${fmt(m.professional_tax)}</td>
                <td style="text-align:right;color:#d32f2f">${fmt(m.tds)}</td>
                <td style="text-align:right;font-weight:700;color:#1B5E20">${fmt(m.net_salary)}</td>
              </tr>`).join('')}
          </tbody>
          <tfoot>
            <tr style="background:#e8f5e9;font-weight:700">
              <td>TOTAL</td>
              <td style="text-align:right">${fmt(months.reduce((s,m)=>s+m.basic,0))}</td>
              <td style="text-align:right">${fmt(months.reduce((s,m)=>s+m.hra,0))}</td>
              <td style="text-align:right">${fmt(months.reduce((s,m)=>s+m.gross,0))}</td>
              <td style="text-align:right">${fmt(months.reduce((s,m)=>s+m.pf_employee,0))}</td>
              <td style="text-align:right">${fmt(months.reduce((s,m)=>s+m.esi_employee,0))}</td>
              <td style="text-align:right">${fmt(months.reduce((s,m)=>s+m.professional_tax,0))}</td>
              <td style="text-align:right;color:#d32f2f">${fmt(months.reduce((s,m)=>s+m.tds,0))}</td>
              <td style="text-align:right;color:#1B5E20">${fmt(months.reduce((s,m)=>s+m.net_salary,0))}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <!-- ══════════ DECLARATION ══════════ -->
    <div class="no-break" style="border:1.5px solid #c8e6c9;border-radius:8px;overflow:hidden;margin-bottom:8px">
      <div class="f16-section-hdr">✅ Declaration</div>
      <div style="padding:14px 16px;font-size:12px;color:#555;line-height:1.8">
        I, the employer, hereby certify that a sum of <strong>${fmt(A.total_tds_deducted)}</strong> has been deducted
        at source and paid to the credit of the Central Government. This certificate is issued in accordance
        with the provisions of Section 203 of the Income Tax Act, 1961, read with Rule 31 of the Income Tax
        Rules, 1962 for the Financial Year <strong>${fy}</strong> (Assessment Year <strong>${ay}</strong>).
      </div>
      <div style="display:flex;justify-content:space-between;padding:16px 16px 8px;border-top:1px solid #e8f5e9">
        <div style="font-size:11px;color:#888">Generated by KrishiHR &nbsp;|&nbsp; hr@krishicare.in</div>
        <div style="font-size:11px;color:#888">Date: ${new Date().toLocaleDateString('en-IN')}</div>
      </div>
    </div>

  </div>`;
}
