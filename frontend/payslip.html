<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KrishiHR - My Payslip</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
@media print {
  .sidebar, .topbar, .no-print { display: none !important; }
  .main { margin-left: 0 !important; }
  .content { padding: 0 !important; }
  @page { size: A4 portrait; margin: 10mm 8mm; }
  #payslip-area > div { max-width: 100% !important; }
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark" id="sidebar-logo-mark">
      <svg class="logo-mark-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div>
      <div class="logo-text-wrap"><div class="logo-text">Krishi<span>HR</span></div><div class="logo-sub">Krishi Care And Management</div></div>
      <div class="logo-sub">Enterprise Edition</div>
    </div>
  </div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div id="sidebar-user"></div>
    <button class="logout-btn" onclick="Auth.logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="topbar-title">My Payslip</div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-outline btn-sm no-print" onclick="window.print()" id="print-btn" style="display:none">🖨 Print / Download PDF</button>
      <button id="notif-bell-btn" class="topbar-icon-btn notif-btn" title="Notifications">🔔<span id="notif-badge"></span></button>
      <a class="topbar-icon-btn" href="dashboard.html" title="Dashboard">🏠</a>
    </div>
  </div>

  <div class="content fade-in">

    <!-- Month Selector -->
    <div class="card no-print" style="padding:16px 22px;margin-bottom:20px">
      <div class="flex gap-3" style="align-items:flex-end;flex-wrap:wrap">
        <div>
          <div class="form-label">Month</div>
          <select id="ps-month" class="form-control" style="width:150px"></select>
        </div>
        <div>
          <div class="form-label">Year</div>
          <select id="ps-year" class="form-control" style="width:100px"></select>
        </div>
        <button class="btn btn-primary" onclick="loadPayslip()">Load Payslip</button>
        <div id="available-months" style="flex:1"></div>
      </div>
    </div>

    <!-- Payslip Render Area -->
    <div id="payslip-area">
      <div class="empty-state">
        <div class="empty-icon">💰</div>
        <p>Select a month above and click <b>Load Payslip</b> to view your salary details.</p>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
Auth.guard();
buildSidebar('payslip.html');
loadNotifBadge();

const NOW = new Date();

// Populate selectors
const monthSel = document.getElementById('ps-month');
const yearSel  = document.getElementById('ps-year');
fmt.months.forEach((m,i) => monthSel.innerHTML += `<option value="${i+1}" ${i+1===NOW.getMonth()+1?'selected':''}>${m}</option>`);
for (let y = NOW.getFullYear(); y >= 2020; y--)
  yearSel.innerHTML += `<option value="${y}" ${y===NOW.getFullYear()?'selected':''}>${y}</option>`;

// Load available payslip months
loadAvailableMonths();

async function loadAvailableMonths() {
  const data = await api('GET', '/my/payslip-months');
  if (!data?.success || !data.data?.length) return;
  const el = document.getElementById('available-months');
  el.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600">Available Payslips:</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${data.data.slice(0,12).map(p => `
        <button class="btn btn-outline btn-sm" onclick="quickLoad(${p.month},${p.year})" style="font-size:11px;padding:4px 10px">
          ${fmt.months[p.month-1].slice(0,3)} ${p.year}
          <span class="badge badge-${p.status}" style="font-size:9px;margin-left:4px">${p.status}</span>
        </button>`).join('')}
    </div>`;
}

function quickLoad(month, year) {
  document.getElementById('ps-month').value = month;
  document.getElementById('ps-year').value  = year;
  loadPayslip();
}

async function loadPayslip() {
  const month = document.getElementById('ps-month').value;
  const year  = document.getElementById('ps-year').value;
  const el    = document.getElementById('payslip-area');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  const data = await api('GET', `/my/payslip?month=${month}&year=${year}`);
  if (!data?.success) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📄</div>
      <p>No payslip found for ${fmt.months[month-1]} ${year}.</p>
      <p class="text-muted" style="margin-top:8px;font-size:13px">Payroll may not have been processed yet for this month.<br>Contact your HR department.</p>
    </div>`;
    document.getElementById('print-btn').style.display = 'none';
    return;
  }

  const p = data.data;
  el.innerHTML = renderPayslip(p);
  document.getElementById('print-btn').style.display = 'flex';
}

function renderPayslip(p) {
  const gross    = parseFloat(p.gross_salary || 0);
  const pfEmp    = parseFloat(p.pf_employee  || 0);
  const pfEmpr   = parseFloat(p.pf_employer  || pfEmp);
  const pfAdmin  = parseFloat(p.pf_admin     || (pfEmp ? Math.round(pfEmp * 0.005/0.12) : 0));
  const esiEmp   = parseFloat(p.esi_employee || 0);
  const esiEmpr  = parseFloat(p.esi_employer || 0);
  const pt       = parseFloat(p.professional_tax || 0);  // use exact DB value, no auto-derive
  const tds      = parseFloat(p.tds          || 0);
  const lwf      = parseFloat(p.lwf          || 0);
  const loanEmi  = parseFloat(p.loan_emi_recovery || 0);

  // Employee deductions (taken from salary)
  const empDedTotal = pfEmp + esiEmp + pt + tds + loanEmi;
  // Employer contributions (shown below gross, not deducted from net)
  const emprContrib = pfEmpr + esiEmpr + pfAdmin;
  const totalEarning = gross + emprContrib;  // matches reference "Total Earning"
  const totalDed     = empDedTotal + emprContrib;
  const netPay       = gross - empDedTotal;  // Net = gross minus employee deductions only

  const wDays     = parseInt(p.working_days || 26);
  const presentDays = parseFloat(p.present_days || wDays);
  const lopDays   = parseFloat(p.lop_days || 0);
  const mon       = fmt.months[parseInt(p.month)-1] + ' ' + p.year;

  const dob = p.date_of_birth ? new Date(p.date_of_birth).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}).replace(/ /g,'-') : '—';
  const doj = p.joining_date  ? new Date(p.joining_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}).replace(/ /g,'-') : '—';
  const location = [p.city, p.state].filter(Boolean).join(', ') || 'Mumbai';

  const Rs = v => v > 0 ? parseFloat(v).toLocaleString('en-IN') : '-';

  // Build earnings rows
  const earningItems = [
    ['Basic Salary',       parseFloat(p.basic || 0)],
    ['HRA',                parseFloat(p.hra   || 0)],
    ['Conveyance Allowance', parseFloat(p.conveyance || p.travel_allowance || 0)],
    ['Gratuity',           parseFloat(p.gratuity || 0)],
    ['Other Allowance',    parseFloat(p.special_allowance || 0)],
  ].filter(r => r[1] > 0);

  // Build deduction rows — employee deductions first, then employer contributions
  const dedItems = [
    ['Provident Fund - Employee contribution', pfEmp],
    ['Professional Tax',   pt],
    ['TDS',                tds],
    ['EMI Recovery',       loanEmi],
    ['ESI - Employee',     esiEmp],
  ].filter(r => r[1] > 0);

  const emprItems = [
    ['Provident Fund - Employer contribution', pfEmpr],
    ['Admin Charges',      pfAdmin],
    ['ESI - Employer',     esiEmpr],
  ].filter(r => r[1] > 0);

  const allDedItems = [...dedItems, ...emprItems];

  const maxRows = Math.max(earningItems.length + 1, allDedItems.length + 1); // +1 for gross/total row
  let tableRows = '';

  for (let i = 0; i < Math.max(earningItems.length, allDedItems.length); i++) {
    const e = earningItems[i];
    const d = allDedItems[i];
    const isSep = i === dedItems.length && emprItems.length > 0; // separator before employer contrib
    tableRows += '<tr>'
      + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc">' + (e ? e[0] : '') + '</td>'
      + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc;text-align:center">' + (e ? Rs(e[1]) : '') + '</td>'
      + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc' + (isSep ? ';border-top:2px solid #888' : '') + '">' + (d ? d[0] : '') + '</td>'
      + '<td style="padding:6px 10px;font-size:14px;border:1px solid #ccc;text-align:center' + (isSep ? ';border-top:2px solid #888' : '') + '">' + (d ? Rs(d[1]) : '') + '</td>'
      + '</tr>';
  }

  return '<div style="font-family:Arial,\'Helvetica Neue\',sans-serif;background:#fff !important;color:#111 !important;max-width:794px;margin:0 auto;border:2px solid #2E7D32 !important;padding:0;box-shadow:0 2px 12px rgba(0,0,0,.08)">'

  // ── HEADER ──
  + '<table style="width:100%;border-collapse:collapse;border-bottom:2px solid #2E7D32 !important">'
  + '<tr>'
  + '<td style="padding:16px 20px;width:15%;vertical-align:middle;background:#F1F8E9 !important;border:none;">'
  + '<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAVAAAAE+CAYAAADbFkjzAAEAAElEQVR4nOz92ZIkR5KmC34sIqq2+O4e+4Y9M5FV1ds09VDfzZPNywzNG8wLzOUhOnPO6eruqkwgsQQQAGL3CF/MTFVEmOdCRM3MPTwWILBldTCRwxC2qIqKirLw8vPPwltLAEBQAByKIAiGADghmWEG5gQnAXOCCUiCVlvAMJSAQ4FET8bAK845skvUg1NPVkSBCGIvH5294rM3Enmrj9/6/PKKE9jwn1cN4nUD1B89pF9PhHqRrxD3ms/X5aJjXfSevObzf0PyqvUFP8Pzc+ZkL55bcsP6jZY6ILOMVb0gIogYIoLV75mVv/VnXxB8EzAzUk7nLuTsEFzVNaBvdYtf93i9/gDisTrLgxL1axNigG88oRmRc6bru/pLBwitbyGX35kzVBPZtIwsUB5wX/+/BdcIrnH4IAQCaRGROpEmr37FyQvvv/76Xv0l1TL2l50XtVeOy4t75eev+7295ha+bvzYL6tBX3v+1TcxU0QcYMtXVWO1S5x9tVftnBec3y7QBhcd4nW/+WXkxet7s9ef6exv8PxcuD5fd1yR5Ry++ApkTzwpys6PHCJCmufy77bsjhp1uUwFcK4cUxUaH1BVzKwq3CIhBNrxiNnpaXljXdGKLO/726nPn0GB4tYOoYMiHQ6+tmNQdztXLFHBgyiW9ewoquJsNmCyOebDDz80C4YLHhcM1wS8F7z34IzJdIyK4gxUeOHVI698/21Ftdz8l53/9a/uJ/6O5fhftZBfp8DeQAe9Ul6nYF57fhFAsbJbAA4pux0idub9i17N7I2u/2XjFLvYhB1+N2yQrzv+T5Uyrpdf36tf316G8b9sfYnaa9bfm83PuvIc/t+ZI2djfjonpYSocPTsmO++uS+zxwlSPfwwRZT7Vf7Kv9VWlmbwARFPzhm1c6pRtCqgc+vgLe2Ht7v7AuLWXMnhb02cc6tFKOADmAPN9eweZAt2dls2treYbIxta2uDvYNdtra22NnfxURRUUy0Gq7V+BYluohJ/vFDf82D9eOO86oH/FWfv/78zr36QclvuYMGebsH8XUK5nWyUqBnXbjzry+T1fW/meI5ez+KInhxPCt52w3idbJSoD9V3u7+vW78b/Z8vJnCHzbG9fmfn84YtS3Bt5AF7TLz057Twzknzxc8fXAoREd30vP86TEnhzOIgEHTtlhOZF1ZqG4ZPHTFgKu6orzaunVXJPNWhvzPr0DPifPF5XZOiJqwWH83AjeByx9usXNly65dv8ru7i7tuKFpPL71hBCYLU6xqjRNdKWwnKCSySGTzz8Fa3L+wfy55W0V6Jsd/1Xy6ofv9QrAv9E4furxX/25vvT63nSDW20wL39wzfJL3n/12vil1sxKfo7wyc9jif7ksxu8bv2fV5zr/y4uuYMs5F5BPYEGkkc7wzoP6omnmedPj3nw/SPuf/9IDh89hROWFqpz4ESwXKxaweGdL+79YHwNCrR6whjFyv3NFCicvX/rA1kf6CAe2i24dG2P69ev2salCRs3J7RbnslkgvMQUyJrJFnGzAjB1TCBYs5wVixYAHVKpP9RrviPtTB+7PHOy9u6gK/+fOnXvDRQpdleGcASOX+Tfpy83fxdrEB/jOJ63Qbwsvk/P+7fRon+9gr0bS3QV9guZ45/kQuPKF4cfd/jzDFuJ3g3wrIRGNOGMdoZ5ICnwYun75QnD5/w7d1veXL/qcwfzZkdzkmnLPVPEE/qy6YpOGyYZ1efhUE3KasQwU+Ut14d7lycc6k0h0GOKIpzQ9i7vM3N21fs5p3r7F/eJWwFntkztMk1c9YvlWYIHhEha6zHVTK5xmTWXD6aN44BXrRY3s6Cent52wUsy1XwEy3gt7RA31bOu/Cr92qw/3UK7DW75/nExQufv+Tnv7z1uS5/vy7862Lor4yBAqOmLfF function numberToWords(amount) {
  if (!amount || isNaN(amount)) return 'Zero Rupees';
  const a = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function inWords(n) {
    if (n < 20) return a[n];
    if (n < 100) return b[Math.floor(n/10)] + (n%10?' '+a[n%10]:'');
    if (n < 1000) return a[Math.floor(n/100)] + ' Hundred' + (n%100?' '+inWords(n%100):'');
    if (n < 100000) return inWords(Math.floor(n/1000)) + ' Thousand' + (n%1000?' '+inWords(n%1000):'');
    if (n < 10000000) return inWords(Math.floor(n/100000)) + ' Lakh' + (n%100000?' '+inWords(n%100000):'');
    return inWords(Math.floor(n/10000000)) + ' Crore' + (n%10000000?' '+inWords(n%10000000):'');
  }
  const rupees = Math.floor(parseFloat(amount));
  return (inWords(rupees)||'Zero') + ' Rupees';
}
