<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KrishiHR — Client Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:24px; }
.kpi-card { background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
.kpi-label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.kpi-val   { font-size:28px; font-weight:800; color:var(--text); }
.kpi-card.blue   { border-color:#3b82f6; background:#eff6ff; }
.kpi-card.green  { border-color:var(--green); background:var(--green-l); }
.kpi-card.orange { border-color:var(--orange); background:var(--orange-l); }

.clients-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.client-card {
  background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
  padding:20px; cursor:pointer; transition:all .18s;
}
.client-card:hover { border-color:var(--accent); box-shadow:var(--shadow-md); transform:translateY(-2px); }
.client-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.client-name { font-size:15px; font-weight:700; color:var(--text); }
.client-meta { font-size:12px; color:var(--muted); margin-top:3px; }
.client-stats { display:flex; gap:0; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
.cs-item { flex:1; text-align:center; }
.cs-val { font-size:20px; font-weight:800; color:var(--accent); }
.cs-lbl { font-size:10px; color:var(--muted); margin-top:1px; text-transform:uppercase; letter-spacing:.3px; }

.status-pill { font-size:10px; font-weight:700; padding:3px 9px; border-radius:20px; text-transform:uppercase; }
.status-pill.active   { background:var(--green-l); color:var(--green-d); }
.status-pill.inactive { background:var(--red-l);   color:var(--red-d); }

/* Panel */
.panel-overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:1199; display:none; backdrop-filter:blur(2px); }
.panel-overlay.open { display:block; }
.slide-panel {
  position:fixed; top:0; right:-500px; width:480px; max-width:100vw; height:100vh;
  background:var(--surface); box-shadow:var(--shadow-xl); z-index:1200;
  transition:right .28s cubic-bezier(.4,0,.2,1); display:flex; flex-direction:column; overflow:hidden;
}
.slide-panel.open { right:0; }
.sp-head { padding:20px 24px 16px; border-bottom:1.5px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.sp-title { font-size:17px; font-weight:700; color:var(--text); }
.sp-body  { flex:1; overflow-y:auto; padding:20px 24px; }
.sp-foot  { padding:14px 24px; border-top:1.5px solid var(--border); display:flex; gap:10px; justify-content:flex-end; flex-shrink:0; }

.emp-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); }
.emp-row:last-child { border-bottom:none; }
.emp-av { width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.emp-n  { font-size:13px; font-weight:600; color:var(--text); }
.emp-c  { font-size:11px; color:var(--muted2); font-family:monospace; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark" id="sidebar-logo-mark">
      <svg class="logo-mark-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div><div class="logo-text-wrap"><div class="logo-text">Krishi<span>HR</span></div></div></div>
  </div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div id="sidebar-user"></div>
    <button class="logout-btn" onclick="Auth.logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
      <div class="topbar-title">🏭 Client Management</div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="openAddClient()">+ New Client</button>
      <button id="notif-bell-btn" class="topbar-icon-btn notif-btn" title="Notifications">🔔<span id="notif-badge"></span></button>
      <a class="topbar-icon-btn" href="dashboard.html" title="Dashboard">🏠</a>
    </div>
  </div>

  <div class="content fade-in">

    <!-- KPIs -->
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-label">Total Clients</div>
        <div class="kpi-val" id="kpi-total">—</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Active</div>
        <div class="kpi-val" id="kpi-active">—</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-label">Total Deployed</div>
        <div class="kpi-val" id="kpi-emp">—</div>
      </div>
    </div>

    <!-- Search -->
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:18px">
      <input id="srch" class="form-control" placeholder="🔍  Search clients…" style="max-width:280px" oninput="render()">
    </div>

    <!-- Grid -->
    <div id="grid" class="clients-grid">
      <div class="loader"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<!-- Overlay + Panel -->
<div class="panel-overlay" id="overlay" onclick="closePanel()"></div>
<div class="slide-panel" id="panel">
  <div class="sp-head">
    <div class="sp-title" id="sp-title">New Client</div>
    <button class="btn btn-ghost btn-sm" onclick="closePanel()">✕</button>
  </div>
  <div class="sp-body" id="sp-body"></div>
  <div class="sp-foot" id="sp-foot"></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
Auth.guard();
buildSidebar('clients.html');
const user = Auth.getUser();
if (!user || !['admin','super_admin','hr','accounts'].includes(user.role)) location.href = 'dashboard.html';

let ALL = [];

async function load() {
  const r = await api('GET', '/clients');
  if (!r?.success) return;
  ALL = r.data || [];
  document.getElementById('kpi-total').textContent  = ALL.length;
  document.getElementById('kpi-active').textContent = ALL.filter(c=>c.status==='active').length;
  document.getElementById('kpi-emp').textContent    = ALL.reduce((s,c)=>s+parseInt(c.employee_count||0),0);
  render();
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  const list = q ? ALL.filter(c=>c.name.toLowerCase().includes(q)||(c.admin_email||'').toLowerCase().includes(q)) : ALL;
  const g = document.getElementById('grid');
  if (!list.length) {
    g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:48px;margin-bottom:12px">🏭</div>
      <p style="font-size:15px;font-weight:600">No clients yet</p>
      <p style="font-size:13px;margin:6px 0 16px">Create your first client to start deploying employees</p>
      <button class="btn btn-primary" onclick="openAddClient()">+ New Client</button>
    </div>`;
    return;
  }
  g.innerHTML = list.map(c=>`
    <div class="client-card" onclick="openDetail(${c.id})">
      <div class="client-card-top">
        <div>
          <div class="client-name">${c.name}</div>
          ${c.admin_email?`<div class="client-meta">📧 ${c.admin_email}</div>`:''}
          ${c.admin_phone?`<div class="client-meta">📱 ${c.admin_phone}</div>`:''}
        </div>
        <span class="status-pill ${c.status||'active'}">${c.status||'active'}</span>
      </div>
      <div class="client-stats">
        <div class="cs-item">
          <div class="cs-val">${c.employee_count||0}</div>
          <div class="cs-lbl">Employees</div>
        </div>
        <div class="cs-item">
          <div class="cs-val" style="font-size:13px;color:var(--muted)">${new Date(c.created_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</div>
          <div class="cs-lbl">Created</div>
        </div>
        <div class="cs-item">
          <div class="cs-val" style="font-size:13px">ID: ${c.id}</div>
          <div class="cs-lbl">Client ID</div>
        </div>
      </div>
    </div>`).join('');
}

// ── Add ───────────────────────────────────────────────────────────────────────
function openAddClient() {
  document.getElementById('sp-title').textContent = '+ New Client';
  document.getElementById('sp-body').innerHTML = `
    <div class="form-group"><label class="form-label">Client Name *</label>
      <input id="f-name" class="form-control" placeholder="e.g. Tata AIG Insurance"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group"><label class="form-label">Admin Email</label>
        <input id="f-email" class="form-control" type="email" placeholder="admin@client.com"></div>
      <div class="form-group"><label class="form-label">Admin Phone</label>
        <input id="f-phone" class="form-control" placeholder="10-digit number"></div>
    </div>
    <div class="form-group"><label class="form-label">Status</label>
      <select id="f-status" class="form-control">
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select></div>
    <div class="form-group"><label class="form-label">Notes</label>
      <textarea id="f-notes" class="form-control" rows="3" placeholder="Optional notes…"></textarea></div>
  `;
  document.getElementById('sp-foot').innerHTML = `
    <button class="btn btn-outline" onclick="closePanel()">Cancel</button>
    <button class="btn btn-primary" onclick="saveNew()">✓ Create Client</button>`;
  openPanel();
}

async function saveNew() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Client name is required','error'); return; }
  const r = await api('POST','/clients',{
    name,
    admin_email: document.getElementById('f-email').value.trim()||null,
    admin_phone: document.getElementById('f-phone').value.trim()||null,
    status:      document.getElementById('f-status').value,
    notes:       document.getElementById('f-notes').value.trim()||null,
  });
  if (r?.success) { toast(`✅ "${name}" created`); closePanel(); load(); }
  else toast(r?.message||'Failed','error');
}

// ── Detail ────────────────────────────────────────────────────────────────────
async function openDetail(id) {
  const c = ALL.find(x=>x.id===id); if(!c) return;
  document.getElementById('sp-title').textContent = `🏭 ${c.name}`;
  document.getElementById('sp-body').innerHTML = `<div class="loader"><div class="spinner"></div></div>`;
  document.getElementById('sp-foot').innerHTML = `
    <button class="btn btn-outline" onclick="closePanel()">Close</button>
    <button class="btn btn-primary" onclick="saveEdit(${id})">💾 Save</button>`;
  openPanel();

  // Load employees
  const er = await api('GET',`/clients/${id}/employees`);
  const emps = er?.data||[];

  document.getElementById('sp-body').innerHTML = `
    <div class="form-group"><label class="form-label">Client Name</label>
      <input id="e-name" class="form-control" value="${c.name}"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group"><label class="form-label">Admin Email</label>
        <input id="e-email" class="form-control" type="email" value="${c.admin_email||''}"></div>
      <div class="form-group"><label class="form-label">Admin Phone</label>
        <input id="e-phone" class="form-control" value="${c.admin_phone||''}"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="form-group"><label class="form-label">Status</label>
        <select id="e-status" class="form-control">
          <option value="active" ${c.status==='active'?'selected':''}>Active</option>
          <option value="inactive" ${c.status==='inactive'?'selected':''}>Inactive</option>
        </select></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label>
      <textarea id="e-notes" class="form-control" rows="2">${c.notes||''}</textarea></div>

    <div style="margin-top:20px;padding-top:16px;border-top:1.5px solid var(--border)">
      <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px">
        👥 Deployed Employees <span style="background:var(--accent);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px">${emps.length}</span>
      </div>
      ${emps.length ? emps.map(e=>`
        <div class="emp-row">
          <div class="emp-av">${(e.first_name?.[0]||'')}${(e.last_name?.[0]||'')}</div>
          <div style="flex:1">
            <div class="emp-n">${e.first_name} ${e.last_name||''}
              ${['client_admin','super_admin_client'].includes(e.role)?`<span style="background:#e0f2fe;color:#0369a1;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:4px">ADMIN</span>`:''}
            </div>
            <div class="emp-c">${e.employee_code} · ${e.department_name||'—'}</div>
          </div>
          <span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:${e.is_active?'var(--green-l)':'var(--red-l)'};color:${e.is_active?'var(--green-d)':'var(--red-d)'}">${e.is_active?'Active':'Inactive'}</span>
        </div>`).join('') :
        `<div style="text-align:center;padding:30px 0;color:var(--muted)">
          <div style="font-size:30px;margin-bottom:8px">👤</div>
          <p style="font-size:13px">No employees yet</p>
          <p style="font-size:12px;margin-top:4px">Import employees with <b>${c.name}</b> in Column A</p>
        </div>`}
    </div>`;
}

async function saveEdit(id) {
  const newStatus = document.getElementById('e-status').value;
  const c = ALL.find(x=>x.id===id);
  
  // Warn if deactivating
  if (c && c.status === 'active' && newStatus === 'inactive') {
    if (!confirm(`⚠️ Deactivating "${c.name}" will also deactivate ALL ${c.employee_count||0} deployed employees including the client admin.\n\nAre you sure?`)) return;
  }
  if (c && c.status === 'inactive' && newStatus === 'active') {
    if (!confirm(`Reactivating "${c.name}" will also reactivate ALL their employees.\n\nContinue?`)) return;
  }

  const r = await api('PUT',`/clients/${id}`,{
    name:        document.getElementById('e-name').value.trim(),
    admin_email: document.getElementById('e-email').value.trim()||null,
    admin_phone: document.getElementById('e-phone').value.trim()||null,
    status:      newStatus,
    notes:       document.getElementById('e-notes').value.trim()||null,
  });
  if (r?.success) { toast(`✅ ${r.message||'Client updated'}`); closePanel(); load(); }
  else toast(r?.message||'Failed','error');
}

function openPanel()  { document.getElementById('panel').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closePanel() { document.getElementById('panel').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

load();
</script>
</body>
</html>
