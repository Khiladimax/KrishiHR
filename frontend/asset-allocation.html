<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asset Allocation</title>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.content { padding:16px; }
.aa-wrap { width:100%; }
.aa-topbar { padding:16px 20px; background:#fff; border-radius:12px 12px 0 0; border-bottom:2px solid #eaf3d8; }
.aa-label { font-size:11px;font-weight:800;color:#8aaa6a;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap; }
.aa-searchbar { position:relative; }
.aa-input { width:300px;padding:9px 14px 9px 36px;border-radius:8px;border:1.5px solid #b8d49a;font-size:13px;font-family:inherit;outline:none;background:#f7faf3; }
.aa-input:focus { border-color:var(--accent);background:#fff; }
.aa-search-icon { position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;color:#8aaa6a; }
.aa-dropdown { position:absolute;top:calc(100% + 4px);left:0;min-width:320px;background:#fff;border:1.5px solid #8aaa6a;border-radius:10px;box-shadow:0 8px 32px rgba(57,73,171,.14);z-index:9999;max-height:280px;overflow-y:auto;display:none; }
.aa-dropdown.open { display:block }
.aa-opt { padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #f7faf3; }
.aa-opt:hover { background:var(--accent-l) }
.aa-badge { display:inline-flex;align-items:center;gap:8px;background:#4a8c1c;color:#fff;border-radius:20px;padding:6px 14px;font-size:12.5px;font-weight:600; }
.aa-badge .clr { cursor:pointer;opacity:.75;font-size:16px;line-height:1;margin-left:2px; }
.aa-body { padding:22px; }
.aa-grid { display:grid;grid-template-columns:2fr 80px 1.3fr 1.6fr auto;gap:10px;align-items:end; }
.aa-field label { display:block;font-size:11px;font-weight:700;color:#5a7a42;margin-bottom:4px; }
.aa-field input, .aa-field select { width:100%;padding:8px 10px;border:1.5px solid #d7e6c4;border-radius:8px;font-size:13px;font-family:inherit;outline:none;box-sizing:border-box; }
.aa-field input:focus, .aa-field select:focus { border-color:var(--accent); }
.stage-row { display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f7faf3;border:1px solid #e3eed3;border-radius:8px;margin-top:8px;font-size:13px; }
.stage-row .x { margin-left:auto;cursor:pointer;color:#c0392b;font-weight:700; }
table.aa-tbl { width:100%;border-collapse:collapse;font-size:13px;margin-top:6px; }
table.aa-tbl th { text-align:left;padding:10px 12px;background:#f2f7ea;color:#5a7a42;font-size:11.5px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;border-bottom:1.5px solid #e3eed3; }
table.aa-tbl td { padding:10px 12px;border-bottom:1px solid #f0f5e8;vertical-align:middle; }
.pill { display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700; }
.pill.alloc { background:#e8f5e9;color:#2e7d32; }
.pill.ret { background:#fff3e0;color:#e65100; }
.muted { color:#8aaa6a;font-size:12px; }
h2.aa-h { font-size:16px;font-weight:800;color:#000;margin:22px 0 8px; }
.aa-tab { padding:8px 18px;border:1.5px solid #000;background:#f7faf3;border-radius:8px;font-size:13px;font-weight:700;color:#333;cursor:pointer; }
.aa-tab.active { background:#4a8c1c;color:#fff;border-color:#000; }
.mx-wrap { overflow-x:auto;border:2px solid #000;border-radius:6px; }
table.mx { border-collapse:collapse;font-size:12.5px;min-width:100%; }
table.mx th, table.mx td { padding:8px 10px;border:1px solid #000;text-align:center;white-space:nowrap; }
table.mx thead th { color:#fff;font-size:11px;font-weight:800;position:sticky;top:0; }
table.mx thead th.sticky { background:#111 !important; color:#fff !important; }
table.mx th.sticky, table.mx td.sticky { position:sticky;left:0;text-align:left;font-weight:700;z-index:2; }
table.mx td.sticky { color:#000;background:#fdfbe9; }
table.mx tbody tr:nth-child(even) td.sticky { background:#f4f0d8; }
table.mx td.cnt { font-weight:800;color:#0d3d10;background:#c8e6c9; }
table.mx td.zero { color:#bbb;background:#fff; }
table.mx tbody tr:nth-child(even) td.zero { background:#f6f8f3; }
/* black borders on the detail/list table too */
table.aa-tbl th, table.aa-tbl td { border:1px solid #000; }
table.aa-tbl th { color:#000; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark" id="sidebar-logo-mark">
      <svg class="logo-mark-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div><div class="logo-text-wrap"><div class="logo-text" id="sidebar-logo-text"></div></div></div>
  </div>
  <nav id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div id="sidebar-user"></div>
    <button class="logout-btn" onclick="Auth.logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main">
<div class="topbar">
  <div class="topbar-left">
    <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="topbar-title">💻 Asset Allocation</div>
  </div>
</div>

<div class="content fade-in">
  <div class="card">
    <div class="aa-wrap">

      <!-- Employee picker (managers only) -->
      <div class="aa-topbar" id="picker-bar" style="display:none">
        <div class="aa-tabs" id="aa-tabs" style="display:flex;gap:6px;margin-bottom:14px"></div>
        <div id="client-filter-wrap" style="display:none;align-items:center;gap:10px;margin-bottom:12px">
          <span class="aa-label">Client:</span>
          <select id="client-filter" class="aa-input" style="width:auto;min-width:240px;padding-left:12px" onchange="onClientChange()"></select>
        </div>
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:12px">
          <span class="aa-label">Allocate for:</span>
          <div class="aa-searchbar">
            <span class="aa-search-icon">🔍</span>
            <input id="emp-search" class="aa-input" placeholder="Type name or employee code…" autocomplete="off"
              oninput="onSearch()" onfocus="openDrop()" onblur="closeDropDelayed()">
            <div id="emp-drop" class="aa-dropdown"></div>
          </div>
          <div id="emp-badge" style="display:none">
            <span class="aa-badge">👤 <span id="emp-label"></span><span class="clr" onclick="clearEmp()" title="Clear">×</span></span>
          </div>
        </div>
      </div>

      <div class="aa-body">
        <!-- Allocate form (managers, after selecting employee) -->
        <div id="alloc-form" style="display:none">
          <h2 class="aa-h">➕ Add items</h2>
          <div class="aa-grid">
            <div class="aa-field">
              <label>Item</label>
              <select id="f-item" onchange="onItemChange()"></select>
            </div>
            <div class="aa-field"><label>Qty</label><input id="f-qty" type="number" min="1" value="1"></div>
            <div class="aa-field"><label>Serial / Asset tag</label><input id="f-serial" placeholder="optional"></div>
            <div class="aa-field"><label>Remark</label><input id="f-remark" placeholder="optional"></div>
            <div class="aa-field"><button class="btn btn-outline btn-sm" onclick="addToStage()" style="height:37px">+ Add</button></div>
          </div>
          <div class="aa-field" id="other-wrap" style="display:none;margin-top:10px;max-width:420px">
            <label>Custom item name</label><input id="f-other" placeholder="Type the item not in the list…">
          </div>

          <div id="stage-list" style="margin-top:12px"></div>
          <div id="stage-actions" style="display:none;margin-top:12px">
            <button class="btn btn-primary btn-sm" onclick="submitAlloc()" id="submit-btn">✅ Allocate <span id="stage-count">0</span> item(s)</button>
            <button class="btn btn-outline btn-sm" onclick="clearStage()">Clear</button>
          </div>
          <div id="emp-detail" style="margin-top:16px"></div>
        </div>

        <!-- Allocations table -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin:22px 0 8px;gap:12px;flex-wrap:wrap">
          <h2 class="aa-h" id="tbl-title" style="margin:0">All allocations</h2>
          <button class="btn btn-outline btn-sm" id="dl-btn" onclick="downloadExcel()" style="display:none">⬇️ Download Excel</button>
        </div>
        <div id="alloc-table"><div class="muted">Loading…</div></div>
      </div>

    </div>
  </div>
</div>

</div>

<script src="app.js"></script>
<script>
Auth.guard();
const MANAGE_ROLES = ['hr','accounts','admin','super_admin','client_admin','super_admin_client'];
let isManager = false, currentEmployeeId = null, currentLabel = '';
let allEmployees = [], itemCatalogue = [], stage = [];

async function api(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + Auth.getToken(), ...(opts.headers || {}) },
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.success === false) throw new Error(data.message || ('HTTP ' + res.status));
  return data;
}
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

let currentScope = 'main';
let scopes = [];
let currentClientId = '';
function scopeQS() { return 'scope=' + currentScope + (currentClientId ? '&client_id=' + encodeURIComponent(currentClientId) : ''); }
async function loadClients() {
  try {
    const r = await api('/assets/clients');
    const clients = r.data || [];
    const wrap = document.getElementById('client-filter-wrap');
    const sel = document.getElementById('client-filter');
    if (clients.length <= 1) {
      wrap.style.display = 'none';
      currentClientId = clients.length === 1 ? String(clients[0].id) : '';
    } else {
      sel.innerHTML = '<option value="">— All clients —</option>' + clients.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
      sel.value = currentClientId;
      wrap.style.display = 'flex';
    }
  } catch (e) { /* ignore */ }
}
function onClientChange() {
  currentClientId = document.getElementById('client-filter').value;
  clearEmp();
  loadEmployees();
  loadMatrix();
}

window.addEventListener('load', async () => {
  buildSidebar('asset-allocation.html');
  const user = Auth.getUser();
  isManager = MANAGE_ROLES.includes(user.role);
  try { const it = await api('/assets/items'); itemCatalogue = it.data || []; } catch (e) { itemCatalogue = []; }
  populateItemSelect();

  if (isManager) {
    document.getElementById('picker-bar').style.display = 'block';
    document.getElementById('dl-btn').style.display = '';
    // A client_admin only has the Client tab; everyone else gets both.
    scopes = (['client_admin','super_admin_client'].includes(user.role))
      ? [{ id: 'client', label: 'Client Employees' }]
      : [{ id: 'main', label: 'Main Employees' }, { id: 'client', label: 'Client Employees' }];
    currentScope = scopes[0].id;
    renderTabs();
    switchTab(currentScope);
  } else {
    currentEmployeeId = user.id;
    document.getElementById('tbl-title').textContent = 'My allocated assets';
    loadMyList();
  }
});

function renderTabs() {
  document.getElementById('aa-tabs').innerHTML = scopes.map(s =>
    `<button class="aa-tab ${s.id === currentScope ? 'active' : ''}" onclick="switchTab('${s.id}')">${s.id === 'client' ? '🏭 ' : '🏢 '}${s.label}</button>`).join('');
}
function switchTab(scope) {
  currentScope = scope;
  currentClientId = '';
  renderTabs();
  clearEmp();
  if (scope === 'client') loadClients();
  else document.getElementById('client-filter-wrap').style.display = 'none';
  document.getElementById('tbl-title').textContent = 'All employees — item counts (' + (scope === 'client' ? 'Client' : 'Main') + ')';
  loadEmployees();
  loadMatrix();
}
async function downloadExcel() {
  try {
    const res = await fetch(API_BASE + '/assets/export?' + scopeQS(),
      { headers: { Authorization: 'Bearer ' + Auth.getToken() } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Asset_Allocation_${currentScope === 'client' ? 'Client' : 'Main'}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) { toast('Download failed: ' + e.message, 'error'); }
}

function populateItemSelect() {
  const sel = document.getElementById('f-item');
  sel.innerHTML = itemCatalogue.map(i => `<option value="${esc(i)}">${esc(i)}</option>`).join('')
    + `<option value="__other__">Other… (type your own)</option>`;
}
function onItemChange() {
  document.getElementById('other-wrap').style.display =
    document.getElementById('f-item').value === '__other__' ? 'block' : 'none';
}

// ── Employee picker ───────────────────────────────────────────────────────────
async function loadEmployees() {
  try { const r = await api('/assets/employees?' + scopeQS()); allEmployees = r.data || []; } catch (e) { allEmployees = []; }
}
function onSearch() {
  const q = document.getElementById('emp-search').value.trim().toLowerCase();
  const drop = document.getElementById('emp-drop');
  if (!q) { drop.classList.remove('open'); return; }
  const hits = allEmployees.filter(e =>
    (`${e.first_name} ${e.last_name}`).toLowerCase().includes(q) ||
    (e.employee_code || '').toLowerCase().includes(q)).slice(0, 30);
  drop.innerHTML = hits.length
    ? hits.map(e => `<div class="aa-opt" onmousedown="selectEmp(${e.id},'${esc(e.employee_code)} — ${esc(e.first_name)} ${esc(e.last_name)}')">${esc(e.employee_code)} — ${esc(e.first_name)} ${esc(e.last_name)}</div>`).join('')
    : `<div class="aa-opt muted">No match</div>`;
  drop.classList.add('open');
}
function openDrop() { if (document.getElementById('emp-search').value.trim()) onSearch(); }
function closeDropDelayed() { setTimeout(() => document.getElementById('emp-drop').classList.remove('open'), 150); }
function selectEmp(id, label) {
  currentEmployeeId = id; currentLabel = label;
  document.getElementById('emp-search').value = '';
  document.getElementById('emp-drop').classList.remove('open');
  document.getElementById('emp-label').textContent = label;
  document.getElementById('emp-badge').style.display = '';
  document.getElementById('alloc-form').style.display = 'block';
  clearStage();
  loadEmpDetail();
}
function clearEmp() {
  currentEmployeeId = null; currentLabel = '';
  document.getElementById('emp-badge').style.display = 'none';
  document.getElementById('alloc-form').style.display = 'none';
}

// ── Staging ───────────────────────────────────────────────────────────────────
function addToStage() {
  let name = document.getElementById('f-item').value;
  if (name === '__other__') name = document.getElementById('f-other').value.trim();
  if (!name) { toast('Pick or type an item', 'error'); return; }
  stage.push({
    item_name: name,
    quantity:  Math.max(1, parseInt(document.getElementById('f-qty').value) || 1),
    serial_no: document.getElementById('f-serial').value.trim(),
    remark:    document.getElementById('f-remark').value.trim(),
  });
  document.getElementById('f-serial').value = '';
  document.getElementById('f-remark').value = '';
  document.getElementById('f-qty').value = '1';
  document.getElementById('f-other').value = '';
  renderStage();
}
function renderStage() {
  const box = document.getElementById('stage-list');
  box.innerHTML = stage.map((s, i) => `<div class="stage-row">📦 <b>${esc(s.item_name)}</b> × ${s.quantity}${s.serial_no ? ` · <span class="muted">SN: ${esc(s.serial_no)}</span>` : ''}${s.remark ? ` · <span class="muted">${esc(s.remark)}</span>` : ''}<span class="x" onclick="rmStage(${i})">✕ remove</span></div>`).join('');
  document.getElementById('stage-actions').style.display = stage.length ? 'block' : 'none';
  document.getElementById('stage-count').textContent = stage.length;
}
function rmStage(i) { stage.splice(i, 1); renderStage(); }
function clearStage() { stage = []; renderStage(); }

async function submitAlloc() {
  if (!currentEmployeeId) { toast('Select an employee', 'error'); return; }
  if (!stage.length) { toast('Add at least one item', 'error'); return; }
  const btn = document.getElementById('submit-btn'); btn.disabled = true;
  try {
    await api('/assets', { method: 'POST', body: JSON.stringify({ employee_id: currentEmployeeId, items: stage }) });
    toast('Assets allocated ✅');
    clearStage();
    loadMatrix();
    loadEmpDetail();
  } catch (e) { toast(e.message, 'error'); }
  btn.disabled = false;
}

// ── Matrix: all employees (rows) × items (columns), count per cell ────────────
async function loadMatrix() {
  const box = document.getElementById('alloc-table');
  box.innerHTML = '<div class="muted">Loading…</div>';
  try {
    const r = await api('/assets/matrix?' + scopeQS());
    const items = r.items || [], rows = r.rows || [];
    if (!rows.length) { box.innerHTML = '<div class="muted">No employees in this list.</div>'; return; }
    const PAL = ['#2E7D32','#1565C0','#6A1B9A','#EF6C00','#00838F','#AD1457','#4527A0','#558B2F','#C62828','#00695C','#5D4037','#283593'];
    box.innerHTML = `<div class="mx-wrap"><table class="mx"><thead><tr>
      <th class="sticky">#</th><th class="sticky" style="left:44px">Emp ID</th><th class="sticky" style="left:132px">Employee</th>
      ${items.map((it, ix) => `<th title="${esc(it)}" style="background:${PAL[ix % PAL.length]}">${esc(it)}</th>`).join('')}
      </tr></thead><tbody>${rows.map((row, i) => `<tr>
        <td class="sticky">${i + 1}</td>
        <td class="sticky" style="left:44px"><b>${esc(row.employee_code)}</b></td>
        <td class="sticky" style="left:132px;text-align:left">${esc(row.emp_name)}</td>
        ${items.map(it => { const c = row.counts[it]; if (!c || !c.qty) return `<td class="zero">·</td>`; return `<td class="cnt">${c.qty}${c.serials ? `<div style="font-size:10px;color:#2e7d32;font-weight:600;margin-top:2px">${esc(c.serials)}</div>` : ''}</td>`; }).join('')}
      </tr>`).join('')}</tbody></table></div>
      <div class="muted" style="margin-top:6px">Numbers = quantity currently allocated (returned items excluded). Select an employee above to add/return items.</div>`;
  } catch (e) { box.innerHTML = `<div class="muted">Failed: ${esc(e.message)}</div>`; }
}

// ── Selected employee's item detail (with Return / Delete) ────────────────────
async function loadEmpDetail() {
  const box = document.getElementById('emp-detail');
  if (!currentEmployeeId) { box.innerHTML = ''; return; }
  box.innerHTML = '<div class="muted">Loading…</div>';
  try {
    const r = await api('/assets?employee_id=' + currentEmployeeId);
    const rows = r.data || [];
    if (!rows.length) { box.innerHTML = '<div class="muted">No assets allocated to this employee yet.</div>'; return; }
    box.innerHTML = `<h2 class="aa-h" style="margin:6px 0 6px">Items with ${esc(currentLabel)}</h2>
      <table class="aa-tbl"><thead><tr><th>Item</th><th>Qty</th><th>Serial</th><th>Remark</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
      <tbody>${rows.map(a => `<tr>
        <td><b>${esc(a.item_name)}</b></td><td>${a.quantity}</td>
        <td>${a.serial_no ? esc(a.serial_no) : '<span class="muted">—</span>'}</td>
        <td>${a.remark ? esc(a.remark) : '<span class="muted">—</span>'}</td>
        <td><span class="pill ${a.status === 'returned' ? 'ret' : 'alloc'}">${a.status === 'returned' ? 'Returned' : 'Allocated'}</span></td>
        <td class="muted">${a.allocated_at ? new Date(a.allocated_at).toLocaleDateString('en-IN') : ''}</td>
        <td style="white-space:nowrap">${a.status === 'returned'
            ? `<button class="btn btn-outline btn-sm" onclick="setStatus(${a.id},'allocated')">↩ Undo</button>`
            : `<button class="btn btn-outline btn-sm" onclick="setStatus(${a.id},'returned')">Returned</button>`}
          <button class="btn btn-outline btn-sm" style="color:#c0392b" onclick="delAlloc(${a.id})">🗑</button></td>
      </tr>`).join('')}</tbody></table>`;
  } catch (e) { box.innerHTML = `<div class="muted">Failed: ${esc(e.message)}</div>`; }
}

// ── Plain employee: their own assets (read-only list) ─────────────────────────
async function loadMyList() {
  const box = document.getElementById('alloc-table');
  box.innerHTML = '<div class="muted">Loading…</div>';
  try {
    const r = await api('/assets/my');
    const rows = r.data || [];
    if (!rows.length) { box.innerHTML = '<div class="muted">No assets allocated to you yet.</div>'; return; }
    box.innerHTML = `<table class="aa-tbl"><thead><tr><th>#</th><th>Item</th><th>Qty</th><th>Serial</th><th>Status</th><th>Date of Allotment</th></tr></thead>
      <tbody>${rows.map((a, i) => `<tr>
        <td>${i + 1}</td><td><b>${esc(a.item_name)}</b></td><td>${a.quantity}</td>
        <td>${a.serial_no ? esc(a.serial_no) : '<span class="muted">—</span>'}</td>
        <td><span class="pill ${a.status === 'returned' ? 'ret' : 'alloc'}">${a.status === 'returned' ? 'Returned' : 'Allocated'}</span></td>
        <td class="muted">${a.allocated_at ? new Date(a.allocated_at).toLocaleDateString('en-IN') : ''}</td>
      </tr>`).join('')}</tbody></table>`;
  } catch (e) { box.innerHTML = `<div class="muted">Failed: ${esc(e.message)}</div>`; }
}

async function setStatus(id, status) {
  try { await api('/assets/' + id, { method: 'PATCH', body: JSON.stringify({ status }) }); loadMatrix(); loadEmpDetail(); }
  catch (e) { toast(e.message, 'error'); }
}
async function delAlloc(id) {
  if (!confirm('Delete this asset record?')) return;
  try { await api('/assets/' + id, { method: 'DELETE' }); toast('Deleted'); loadMatrix(); loadEmpDetail(); }
  catch (e) { toast(e.message, 'error'); }
}
</script>
</body>
</html>
